services:
  - type: web
    name: 4dx-platform-backend
    runtime: node
    branch: main
    rootDir: .
    buildCommand: pnpm prisma generate && pnpm build
    preDeployCommand: pnpm prisma migrate deploy
    startCommand: pnpm exec next start -p $PORT
    autoDeploy: true
    envVars:
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: CRON_SECRET
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        sync: false

  - type: web
    name: 4dx-platform-frontend
    runtime: node
    branch: main
    rootDir: .
    buildCommand: npm ci && npm --prefix 4dx-frontend ci && npm --prefix 4dx-frontend run build
    startCommand: npm --prefix 4dx-frontend run start -- -p $PORT
    autoDeploy: true
    envVars:
      - key: NEXT_PUBLIC_BACKEND_URL
        sync: false

  - type: cron
    name: 4dx-generate-weekly-sessions
    runtime: node
    branch: main
    rootDir: .
    schedule: "0 0 * * 1"
    buildCommand: pnpm prisma generate
    startCommand: pnpm cron:generate-sessions

  - type: cron
    name: 4dx-mark-overdue-sessions
    runtime: node
    branch: main
    rootDir: .
    schedule: "0 9 * * 2"
    buildCommand: pnpm prisma generate
    startCommand: pnpm cron:mark-overdue

  - type: cron
    name: 4dx-wigs-at-risk-notifications
    runtime: node
    branch: main
    rootDir: .
    schedule: "0 8 * * *"
    buildCommand: pnpm prisma generate
    startCommand: pnpm notify:wigs-at-risk
